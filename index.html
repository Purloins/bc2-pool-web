<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappool</title>
<style>
  :root {
    --bg: #eef4f8; --surface: #ffffff; --border: #dbe5ec;
    --ink: #2b3036; --muted: #788591; --link: #2f7fa0;
    --blue: #4aa3c7; --blue-dark: #357f9f; --blue-soft: #e8f4fb; --blue-line: #c4e2f0;
    --amber-bg: #fdf3da; --amber-ink: #93741c; --amber-line: #ecd9a0;
    --red: #e25c5c; --red-dark: #cf4a4a;
    --row-alt: #f4fafd;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; margin: 0; background: var(--bg); color: var(--ink); line-height: 1.45; }
  header { background: var(--surface); padding: 12px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  header h1 { font-size: 18px; margin: 0; margin-right: auto; letter-spacing: .3px; }
  .tabs { display: flex; gap: 4px; }
  .tabs button { background: #eef3f6; color: var(--ink); border: 1px solid var(--border); padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 14px; }
  .tabs button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .user { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .user img { width: 28px; height: 28px; border-radius: 50%; }
  .pill { font-size: 11px; background: var(--blue-soft); color: var(--blue-dark); border: 1px solid var(--blue-line); padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: .4px; }
  main { padding: 18px; max-width: 1180px; margin: 0 auto; }
  input, select { background: #fff; color: var(--ink); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  input:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(74,163,199,.18); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 3px; }
  .btn { background: var(--blue); color: #fff; border: 1px solid var(--blue); padding: 8px 14px; border-radius: 7px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
  .btn.secondary { background: #eef3f6; color: var(--ink); border-color: var(--border); }
  .btn.danger { background: var(--red); border-color: var(--red); }
  .btn.danger:hover { background: var(--red-dark); }
  .btn:hover { filter: brightness(.97); }
  .btn.sm { padding: 5px 10px; font-size: 13px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; }
  .round-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .round-bar button { background: #fff; color: var(--ink); border: 1px solid var(--border); padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; }
  .round-bar button.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* viewer cards */
  .mod-group { margin-bottom: 22px; }
  .mod-header { font-size: 15px; font-weight: 700; margin: 0 0 8px; padding-left: 8px; border-left: 4px solid var(--blue); }
  .slot { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; align-items: center; }
  .slot .cover { width: 120px; height: 67px; border-radius: 5px; object-fit: cover; background: #e6eef3; flex-shrink: 0; }
  .slot .badge { flex-shrink: 0; width: 50px; text-align: center; font-weight: 700; font-size: 13px; padding: 6px 0; border-radius: 6px; color: #fff; }
  .slot .info { flex: 1; min-width: 0; }
  .slot .info .title { font-weight: 700; font-size: 15px; }
  .slot .info .title a { color: var(--ink); text-decoration: none; }
  .slot .info .title a:hover { color: var(--link); }
  .slot .info .sub { font-size: 12px; color: var(--muted); }
  .slot .stats { font-size: 12px; color: #4a555f; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .slot .stats b { color: var(--blue-dark); }
  .skills { margin-top: 4px; display: flex; gap: 5px; flex-wrap: wrap; }
  .skill-tag { background: var(--amber-bg); color: var(--amber-ink); border: 1px solid var(--amber-line); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .NM { background: #4a8fe0; } .HD { background: #d8a93c; } .HR { background: #e05959; }
  .DT { background: #9461df; } .FM { background: #46b06a; } .TB { background: #7b8794; }
  .EZ { background: #3bb2a0; } .FL { background: #5a6470; }

  /* builder table */
  .pool-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; font-size: 13px; }
  .pool-table thead th { background: var(--blue); color: #fff; font-size: 11px; letter-spacing: .6px; text-transform: uppercase; font-weight: 700; padding: 11px 8px; text-align: left; white-space: nowrap; }
  .pool-table tbody td { padding: 8px; border-top: 1px solid var(--border); vertical-align: middle; }
  .pool-table tbody tr:nth-child(even) { background: var(--row-alt); }
  .pool-table .banner { width: 56px; height: 40px; object-fit: cover; border-radius: 4px; background: #e6eef3; display: block; }
  .pool-table .slot-cell { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
  .slot-badge { display: inline-block; min-width: 44px; text-align: center; font-weight: 700; font-size: 12px; padding: 3px 8px; border-radius: 6px; background: var(--blue-soft); color: var(--blue-dark); border: 1px solid var(--blue-line); }
  .pool-table select.mod { padding: 3px 6px; font-weight: 700; }
  .pool-table input.idbox { width: 96px; }
  .pool-table input.idx { width: 34px; }
  .pool-table input.stat { width: 48px; text-align: center; }
  .pool-table input.skills, .pool-table input.notes { width: 100%; min-width: 110px; }
  .pool-table input.skills { background: var(--amber-bg); border-color: var(--amber-line); color: var(--amber-ink); }
  .map-info .t { font-weight: 700; }
  .map-info .a { color: var(--link); font-size: 12px; }
  .map-info .d { color: var(--muted); font-size: 12px; }
  .sr { font-weight: 700; color: var(--blue-dark); white-space: nowrap; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .muted { color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  .save-state { font-size: 12px; color: #3a9a5c; }
  @media (max-width: 640px) { .slot { flex-wrap: wrap; } .slot .cover { width: 100%; height: auto; } }
</style>
</head>
<body>
<header>
  <h1 id="tname">Mappool</h1>
  <div class="tabs" id="tabs"></div>
  <div class="user" id="userbox"></div>
</header>
<main id="app"><div class="empty">Loading…</div></main>

<script>
const MODS = ["NM","HD","HR","DT","FM","TB","EZ","FL"];
let me = null, pool = { name: "Mappool", rounds: [] }, view = "viewer", activeRound = null, saveTimer = null;
let sgStats = null;

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Math.random().toString(36).slice(2, 9);

function parseOsu(url) {
  let setId = null, mapId = null, m;
  if ((m = url.match(/beatmapsets\/(\d+)(?:#\w+\/(\d+))?/))) { setId = m[1]; mapId = m[2] || null; }
  else if ((m = url.match(/\/b\/(\d+)|beatmaps\/(\d+)/))) { mapId = m[1] || m[2]; }
  return { beatmapsetId: setId, beatmapId: mapId };
}
const cover = id => id ? `https://assets.ppy.sh/beatmaps/${id}/covers/cover.jpg` : "";
const banner = id => id ? `https://assets.ppy.sh/beatmaps/${id}/covers/list.jpg` : "";
function mapLink(s) {
  if (s.beatmapsetId && s.beatmapId) return `https://osu.ppy.sh/beatmapsets/${s.beatmapsetId}#osu/${s.beatmapId}`;
  if (s.beatmapId) return `https://osu.ppy.sh/beatmaps/${s.beatmapId}`;
  if (s.beatmapsetId) return `https://osu.ppy.sh/beatmapsets/${s.beatmapsetId}`;
  return "#";
}
async function api(path, opts) {
  const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || res.status); }
  return res.json();
}
async function fetchStats(beatmapId, mod) {
  return api(`/api/beatmap?id=${encodeURIComponent(beatmapId)}&mod=${encodeURIComponent(mod||"NM")}`);
}
function statLine(s) {
  const out = [];
  if (s.stars != null && s.stars !== "")  out.push(`<b>${esc(s.stars)}★</b>`);
  if (s.bpm)    out.push(`${esc(s.bpm)} BPM`);
  if (s.length) out.push(esc(s.length));
  if (s.cs != null && s.cs !== "") out.push(`CS ${esc(s.cs)}`);
  if (s.ar != null && s.ar !== "") out.push(`AR ${esc(s.ar)}`);
  if (s.od != null && s.od !== "") out.push(`OD ${esc(s.od)}`);
  if (s.hp != null && s.hp !== "") out.push(`HP ${esc(s.hp)}`);
  return out;
}

async function init() {
  try { me = (await api("/api/me")).user; } catch (e) { me = null; }
  try { pool = (await api("/api/pool")).pool; } catch (e) {}
  if (!activeRound) activeRound = pool.rounds[0]?.id || null;
  render();
}
const isHost = () => me && me.role === "host";
const canSuggest = () => me && (me.role === "host" || me.role === "mappooler");

function render() {
  document.getElementById("tname").textContent = pool.name || "Mappool";
  const ub = document.getElementById("userbox");
  ub.innerHTML = me
    ? `<img src="${esc(me.avatar_url||"")}" alt=""><span>${esc(me.username)}</span><span class="pill">${esc(me.role)}</span><a class="btn secondary sm" href="/api/auth/logout">Logout</a>`
    : `<a class="btn" href="/api/auth/login">Login with osu!</a>`;
  const tabs = [["viewer","Viewer"]];
  if (canSuggest()) tabs.push(["suggest","Suggestions"]);
  if (isHost()) { tabs.push(["builder","Builder"]); tabs.push(["admin","Admin"]); }
  if (!tabs.find(t => t[0] === view)) view = "viewer";
  document.getElementById("tabs").innerHTML = tabs.map(([k,l]) => `<button class="${k===view?'active':''}" onclick="view='${k}';render()">${l}</button>`).join("");
  ({ viewer: renderViewer, builder: renderBuilder, suggest: renderSuggest, admin: renderAdmin }[view])();
}
function roundBar(active, varName) {
  return `<div class="round-bar">` + pool.rounds.map(r =>
    `<button class="${r.id===active.id?'active':''}" onclick="${varName}='${r.id}';render()">${esc(r.name)}</button>`).join("") + `</div>`;
}

/* ---------- VIEWER ---------- */
function renderViewer() {
  const app = document.getElementById("app");
  if (!pool.rounds.length) { app.innerHTML = `<div class="empty">No rounds yet.</div>`; return; }
  const round = pool.rounds.find(r => r.id === activeRound) || pool.rounds[0];
  activeRound = round.id;
  let html = roundBar(round, "activeRound");
  if (round.mappackUrl) html += `<p><a class="btn" href="${esc(round.mappackUrl)}" target="_blank" rel="noopener">⬇ Download mappack</a></p>`;
  const slots = round.slots || [];
  if (!slots.length) { app.innerHTML = html + `<div class="empty">No maps in ${esc(round.name)} yet.</div>`; return; }
  const order = m => { const i = MODS.indexOf(m); return i === -1 ? 99 : i; };
  const groups = {};
  slots.forEach(s => (groups[s.mod] = groups[s.mod] || []).push(s));
  Object.keys(groups).sort((a,b)=>order(a)-order(b)).forEach(mod => {
    html += `<div class="mod-group"><div class="mod-header">${esc(mod)}</div>`;
    groups[mod].forEach(s => {
      const stats = statLine(s);
      const skills = (s.skills||"").split(",").map(x=>x.trim()).filter(Boolean);
      html += `<div class="slot">
        <span class="badge ${esc(s.mod)}">${esc(s.mod)}${esc(s.index||"")}</span>
        <img class="cover" src="${cover(s.beatmapsetId)}" onerror="this.style.visibility='hidden'" alt="">
        <div class="info">
          <div class="title"><a href="${mapLink(s)}" target="_blank" rel="noopener">${esc(s.artist?s.artist+" - ":"")}${esc(s.title||"Untitled")}</a></div>
          <div class="sub">[${esc(s.difficulty||"?")}] mapped by ${esc(s.mapper||"?")}</div>
          ${stats.length?`<div class="stats">${stats.join(" ")}</div>`:""}
          ${skills.length?`<div class="skills">${skills.map(t=>`<span class="skill-tag">${esc(t)}</span>`).join("")}</div>`:""}
        </div></div>`;
    });
    html += `</div>`;
  });
  app.innerHTML = html;
}

/* ---------- BUILDER ---------- */
function savePool(now) {
  clearTimeout(saveTimer);
  const doSave = async () => {
    const el = document.getElementById("savestate");
    if (el) el.textContent = "Saving…";
    try { await api("/api/pool", { method: "POST", body: JSON.stringify(pool) }); if (el) el.textContent = "Saved ✓"; }
    catch (e) { if (el) el.textContent = "Save failed: " + e.message; }
  };
  now ? doSave() : (saveTimer = setTimeout(doSave, 600));
}
function renderBuilder() {
  const app = document.getElementById("app");
  let html = `<div class="row">
      <div class="field"><label>Tournament name</label>
        <input value="${esc(pool.name)}" oninput="pool.name=this.value;document.getElementById('tname').textContent=this.value;savePool()"></div>
      <div class="field"><label>New round</label><input id="newRound" placeholder="e.g. Quarterfinals"></div>
      <button class="btn" onclick="addRound()">+ Add round</button>
      <span id="savestate" class="save-state"></span>
    </div>`;
  if (!pool.rounds.length) { app.innerHTML = html + `<div class="empty">No rounds yet — add one to start building.</div>`; return; }
  const round = pool.rounds.find(r => r.id === activeRound) || pool.rounds[0];
  activeRound = round.id;
  html += roundBar(round, "activeRound");
  html += `<div class="row">
      <div class="field" style="flex:1;min-width:240px"><label>Mappack URL</label>
        <input value="${esc(round.mappackUrl||"")}" oninput="setRound('${round.id}','mappackUrl',this.value)" placeholder="https://..."></div>
      <button class="btn danger" onclick="deleteRound('${round.id}')">Delete round</button>
    </div>`;
  html += `<div style="overflow-x:auto"><table class="pool-table"><thead><tr>
    <th>Slot</th><th>Beatmap ID</th><th>Banner</th><th>Map info</th><th>Mapper</th>
    <th>SR</th><th>BPM</th><th>Length</th><th>CS</th><th>AR</th><th>OD</th><th>HP</th>
    <th>Skills</th><th>Comments</th><th>Actions</th></tr></thead><tbody>`;
  (round.slots||[]).forEach(s => {
    html += `<tr>
      <td><div class="slot-cell">
        <span class="slot-badge">${esc(s.mod)}${esc(s.index||"")}</span>
        <select class="mod" onchange="onModChange('${s._id}',this.value)">${MODS.map(m=>`<option ${m===s.mod?'selected':''}>${m}</option>`).join("")}</select>
        <input class="idx" value="${esc(s.index||"")}" placeholder="#" oninput="upd('${s._id}','index',this.value)">
      </div></td>
      <td><input class="idbox" value="${esc(s.beatmapId||"")}" placeholder="id or link" onchange="onIdInput('${s._id}',this.value)"></td>
      <td>${s.beatmapsetId?`<img class="banner" src="${banner(s.beatmapsetId)}" onerror="this.style.visibility='hidden'" alt="">`:`<div class="banner"></div>`}</td>
      <td class="map-info" style="min-width:170px">
        <div class="t">${esc(s.title||"—")}</div>
        ${s.artist?`<div class="a">${esc(s.artist)}</div>`:""}
        ${s.difficulty?`<div class="d">[${esc(s.difficulty)}]</div>`:""}</td>
      <td>${esc(s.mapper||"")}</td>
      <td class="sr">${s.stars!=null&&s.stars!==""?"★"+esc(s.stars):""}</td>
      <td><input class="stat" value="${esc(s.bpm ?? '')}" oninput="upd('${s._id}','bpm',this.value)"></td>
      <td><input class="stat" value="${esc(s.length ?? '')}" oninput="upd('${s._id}','length',this.value)"></td>
      <td><input class="stat" value="${esc(s.cs ?? '')}" oninput="upd('${s._id}','cs',this.value)"></td>
      <td><input class="stat" value="${esc(s.ar ?? '')}" oninput="upd('${s._id}','ar',this.value)"></td>
      <td><input class="stat" value="${esc(s.od ?? '')}" oninput="upd('${s._id}','od',this.value)"></td>
      <td><input class="stat" value="${esc(s.hp ?? '')}" oninput="upd('${s._id}','hp',this.value)"></td>
      <td><input class="skills" value="${esc(s.skills||"")}" placeholder="Aim, Tech" oninput="upd('${s._id}','skills',this.value)"></td>
      <td><input class="notes" value="${esc(s.comment||"")}" placeholder="Notes…" oninput="upd('${s._id}','comment',this.value)"></td>
      <td style="white-space:nowrap">
        <button class="btn secondary sm" title="Re-fetch stats" onclick="fetchSlot('${s._id}')">↻</button>
        <button class="btn danger sm" onclick="delSlot('${s._id}')">Remove</button></td></tr>`;
  });
  html += `</tbody></table></div>
    <div class="row" style="margin-top:10px"><button class="btn" onclick="addSlot('${round.id}')">+ Add map</button>
    <span class="muted">Enter a beatmap (difficulty) ID — banner and stats fill automatically and recalc when you change the mod. ★ SR and stats stay editable for manual overrides.</span></div>`;
  app.innerHTML = html;
}
function addRound() {
  const name = (document.getElementById("newRound").value||"").trim(); if (!name) return;
  const r = { id: uid(), name, mappackUrl: "", slots: [] };
  pool.rounds.push(r); activeRound = r.id; savePool(true); render();
}
function deleteRound(id) {
  if (!confirm("Delete this round and its maps?")) return;
  pool.rounds = pool.rounds.filter(r => r.id !== id);
  activeRound = pool.rounds[0]?.id || null; savePool(true); render();
}
function setRound(id, field, v) { const r = pool.rounds.find(x=>x.id===id); if (r){ r[field]=v; savePool(); } }
function addSlot(roundId) {
  const r = pool.rounds.find(x=>x.id===roundId); if (!r) return;
  r.slots.push({ _id: uid(), mod:"NM", index:"", title:"", artist:"", difficulty:"", mapper:"", stars:"", bpm:"", length:"", cs:"", ar:"", od:"", hp:"", skills:"", comment:"", beatmapId:null, beatmapsetId:null });
  savePool(); renderBuilder();
}
function delSlot(sid) {
  const r = pool.rounds.find(x=>x.id===activeRound); if (!r) return;
  r.slots = r.slots.filter(s=>s._id!==sid); savePool(); renderBuilder();
}
function findSlot(sid) { for (const r of pool.rounds){ const s=(r.slots||[]).find(x=>x._id===sid); if (s) return s; } return null; }
function upd(sid, field, v) { const s = findSlot(sid); if (s){ s[field]=v; savePool(); } }
function onIdInput(sid, v) {
  const s = findSlot(sid); if (!s) return;
  const ids = parseOsu(v);
  const id = ids.beatmapId || (/^\d+$/.test(v.trim()) ? v.trim() : null);
  s.beatmapId = id;
  if (ids.beatmapsetId) s.beatmapsetId = ids.beatmapsetId;
  savePool();
  if (id) fetchSlot(sid); else renderBuilder();
}
function onModChange(sid, v) {
  const s = findSlot(sid); if (!s) return; s.mod = v; savePool();
  if (s.beatmapId) fetchSlot(sid); else renderBuilder();
}
async function fetchSlot(sid) {
  const s = findSlot(sid); if (!s) return;
  if (!s.beatmapId) { alert("Enter a beatmap (difficulty) ID first."); return; }
  const el = document.getElementById("savestate"); if (el) el.textContent = "Fetching…";
  try {
    const d = await fetchStats(s.beatmapId, s.mod);
    Object.assign(s, { beatmapsetId: d.beatmapsetId, title: d.title, artist: d.artist, mapper: d.mapper,
      difficulty: d.difficulty, cs: d.cs, ar: d.ar, od: d.od, hp: d.hp, bpm: d.bpm, length: d.length, stars: d.stars });
    savePool(true); renderBuilder();
  } catch (e) { if (el) el.textContent = "Fetch failed: " + e.message; }
}

/* ---------- SUGGESTIONS ---------- */
async function renderSuggest() {
  const app = document.getElementById("app");
  app.innerHTML = `<div class="empty">Loading suggestions…</div>`;
  let list = [];
  try { list = (await api("/api/suggestions")).suggestions; } catch (e) { app.innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
  const roundOpts = pool.rounds.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join("");
  let html = `<div class="card"><h3 style="margin-top:0">Suggest a map</h3>
    <div class="row">
      <div class="field"><label>Round</label><select id="sg-round"><option value="">—</option>${roundOpts}</select></div>
      <div class="field"><label>Mod</label><select id="sg-mod" onchange="sgFetch()">${MODS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="field" style="flex:1;min-width:220px"><label>Beatmap ID or link</label><input id="sg-link" placeholder="5536758 or full link" onchange="sgFetch()"></div>
    </div>
    <div id="sg-preview" class="muted"></div>
    <div class="row" style="margin-top:8px">
      <div class="field" style="flex:2;min-width:220px"><label>Comment</label><input id="sg-comment" placeholder="why this map?"></div>
      <button class="btn" onclick="submitSuggestion()">Submit suggestion</button>
    </div></div>`;
  html += `<h3>Suggestions (${list.length})</h3>`;
  if (!list.length) html += `<div class="empty">No suggestions yet. Add the first one above.</div>`;
  list.forEach(s => {
    const stats = statLine(s);
    const payload = encodeURIComponent(JSON.stringify(s));
    html += `<div class="card"><div style="display:flex;gap:12px;align-items:center">
      ${s.beatmapsetId?`<img class="cover" style="width:96px;height:54px;border-radius:5px;object-fit:cover" src="${cover(s.beatmapsetId)}" onerror="this.style.display='none'" alt="">`:""}
      <div style="flex:1;min-width:0">
        <div><span class="badge ${esc(s.mod)}" style="display:inline-block;width:auto;padding:2px 8px;color:#fff;border-radius:6px;font-size:12px">${esc(s.mod)}</span>
          ${s.round?`<span class="pill">${esc(s.round)}</span>`:""}
          ${s.link?`<a href="${esc(s.link)}" target="_blank" rel="noopener">${esc((s.artist?s.artist+' - ':'')+(s.title||s.link))}</a>`:esc(s.title)}
          ${s.difficulty?`<span class="muted"> [${esc(s.difficulty)}]</span>`:""}</div>
        ${stats.length?`<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#4a555f;margin-top:4px">${stats.join(" ")}</div>`:""}
        ${s.comment?`<div class="muted">${esc(s.comment)}</div>`:""}
        <div class="muted">by ${esc(s.by)} · ${new Date(s.at).toLocaleString()}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${isHost()?`<button class="btn sm" onclick="addSuggestionToPool('${payload}')">→ Add to pool</button>`:""}
        ${(isHost()||s.byId===me.id)?`<button class="btn danger sm" onclick="delSuggestion('${s.id}')">Delete</button>`:""}
      </div></div></div>`;
  });
  app.innerHTML = html;
}
async function sgFetch() {
  sgStats = null;
  const link = document.getElementById("sg-link").value.trim();
  const mod = document.getElementById("sg-mod").value;
  const prev = document.getElementById("sg-preview");
  const ids = parseOsu(link);
  const id = ids.beatmapId || (/^\d+$/.test(link) ? link : null);
  if (!id) { prev.textContent = link ? "Use a beatmap (difficulty) ID or a link with #osu/<id>." : ""; return; }
  prev.textContent = "Fetching stats…";
  try {
    const d = await fetchStats(id, mod);
    sgStats = d;
    prev.innerHTML = `<b>${esc(d.artist)} - ${esc(d.title)}</b> [${esc(d.difficulty)}] · ` + statLine(d).join(" ");
  } catch (e) { prev.textContent = "Could not fetch: " + e.message; }
}
async function submitSuggestion() {
  const raw = document.getElementById("sg-link").value.trim();
  const ids = parseOsu(raw);
  const link = ids.beatmapId ? raw : (sgStats ? `https://osu.ppy.sh/beatmaps/${sgStats.beatmapId}` : raw);
  const body = { round: document.getElementById("sg-round").value, mod: document.getElementById("sg-mod").value, link,
    comment: document.getElementById("sg-comment").value.trim() };
  if (sgStats) Object.assign(body, { title: sgStats.title, artist: sgStats.artist, mapper: sgStats.mapper, difficulty: sgStats.difficulty,
    beatmapId: sgStats.beatmapId, beatmapsetId: sgStats.beatmapsetId, stars: sgStats.stars, bpm: sgStats.bpm, length: sgStats.length,
    cs: sgStats.cs, ar: sgStats.ar, od: sgStats.od, hp: sgStats.hp });
  if (!body.link && !body.title) { alert("Add a beatmap ID/link (or at least a title)."); return; }
  try { await api("/api/suggestions", { method: "POST", body: JSON.stringify(body) }); sgStats = null; renderSuggest(); }
  catch (e) { alert(e.message); }
}
async function delSuggestion(id) {
  if (!confirm("Delete this suggestion?")) return;
  try { await api("/api/suggestions?id=" + id, { method: "DELETE" }); renderSuggest(); }
  catch (e) { alert(e.message); }
}
function addSuggestionToPool(payload) {
  const s = JSON.parse(decodeURIComponent(payload));
  let r = pool.rounds.find(x => x.name === s.round) || pool.rounds[0];
  if (!r) { alert("Create a round first (Builder tab)."); return; }
  r.slots.push({ _id: uid(), mod: s.mod||"NM", index: "", title: s.title||"", artist: s.artist||"", difficulty: s.difficulty||"",
    mapper: s.mapper||"", stars: s.stars ?? "", bpm: s.bpm ?? "", length: s.length||"", cs: s.cs ?? "", ar: s.ar ?? "", od: s.od ?? "", hp: s.hp ?? "",
    skills: "", comment: s.comment||"", beatmapId: s.beatmapId||null, beatmapsetId: s.beatmapsetId||null });
  savePool(true);
  alert(`Added to ${r.name}.`);
}

/* ---------- ADMIN ---------- */
async function renderAdmin() {
  const app = document.getElementById("app");
  app.innerHTML = `<div class="empty">Loading roles…</div>`;
  let roles = [];
  try { roles = (await api("/api/roles")).roles; } catch (e) { app.innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
  let html = `<div class="card"><h3 style="margin-top:0">Assign role</h3>
    <div class="row">
      <div class="field" style="flex:1;min-width:200px"><label>osu! username or user ID</label><input id="rl-key" placeholder="e.g. peppy or 2"></div>
      <div class="field"><label>Role</label><select id="rl-role"><option value="mappooler">mappooler</option><option value="host">host</option></select></div>
      <button class="btn" onclick="assignRole()">Save role</button>
    </div>
    <span class="muted"><b>host</b> — full admin (builder + everything). <b>mappooler</b> — suggest and view suggestions. Everyone else views only.</span>
  </div>`;
  html += `<h3>Current roles (${roles.length})</h3>`;
  if (!roles.length) html += `<div class="empty">No roles assigned yet. The owner account is always host.</div>`;
  roles.forEach(r => {
    html += `<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="flex:1"><b>${esc(r.username||r.id)}</b> <span class="muted">(id ${esc(r.id)})</span> &nbsp;<span class="pill">${esc(r.role)}</span></div>
      <button class="btn danger sm" onclick="removeRole('${esc(r.id)}','${esc(r.username||r.id)}')">Remove</button></div>`;
  });
  app.innerHTML = html;
}
async function assignRole() {
  const key = document.getElementById("rl-key").value.trim();
  const role = document.getElementById("rl-role").value;
  if (!key) return;
  try { await api("/api/roles", { method: "POST", body: JSON.stringify({ key, role }) }); renderAdmin(); }
  catch (e) { alert(e.message); }
}
async function removeRole(id, name) {
  if (!confirm(`Remove role from ${name}?`)) return;
  try { await api("/api/roles", { method: "POST", body: JSON.stringify({ key: id, role: "user" }) }); renderAdmin(); }
  catch (e) { alert(e.message); }
}

init();
</script>
