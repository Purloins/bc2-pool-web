<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappool</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #1a1a1e; color: #e8e8ea; line-height: 1.45; }
  header { background: #232329; padding: 12px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #34343c; }
  header h1 { font-size: 18px; margin: 0; margin-right: auto; }
  .tabs { display: flex; gap: 4px; }
  .tabs button { background: #34343c; color: #e8e8ea; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .tabs button.active { background: #e0457b; }
  .user { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .user img { width: 28px; height: 28px; border-radius: 50%; }
  .pill { font-size: 11px; background: #34343c; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
  main { padding: 16px; max-width: 1000px; margin: 0 auto; }
  input, select { background: #2a2a30; color: #e8e8ea; border: 1px solid #44444c; border-radius: 5px; padding: 6px 8px; font-size: 13px; }
  label { font-size: 12px; color: #a0a0a8; display: block; margin-bottom: 3px; }
  .btn { background: #e0457b; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
  .btn.secondary { background: #34343c; } .btn.danger { background: #7a2a2a; }
  .btn:hover { opacity: .9; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; }
  .round-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .round-bar button { background: #2a2a30; color: #e8e8ea; border: 1px solid #44444c; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .round-bar button.active { background: #e0457b; border-color: #e0457b; }
  .mod-group { margin-bottom: 22px; }
  .mod-header { font-size: 15px; font-weight: 600; margin: 0 0 8px; padding-left: 8px; border-left: 4px solid #e0457b; }
  .slot { display: flex; gap: 12px; background: #232329; border: 1px solid #34343c; border-radius: 8px; padding: 10px; margin-bottom: 8px; align-items: center; }
  .slot .cover { width: 120px; height: 67px; border-radius: 5px; object-fit: cover; background: #34343c; flex-shrink: 0; }
  .slot .badge { flex-shrink: 0; width: 48px; text-align: center; font-weight: 700; font-size: 13px; padding: 6px 0; border-radius: 5px; color: #fff; }
  .slot .info { flex: 1; min-width: 0; }
  .slot .info .title { font-weight: 600; font-size: 15px; }
  .slot .info .title a { color: #e8e8ea; text-decoration: none; }
  .slot .info .sub { font-size: 12px; color: #a0a0a8; }
  .slot .stats { font-size: 12px; color: #c8c8d0; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .slot .stats b { color: #e0457b; }
  .skills { margin-top: 4px; display: flex; gap: 5px; flex-wrap: wrap; }
  .skill-tag { background: #34343c; font-size: 11px; padding: 2px 7px; border-radius: 10px; }
  .NM { background: #4a8fe0; } .HD { background: #d8b73c; } .HR { background: #e05050; }
  .DT { background: #9050e0; } .FM { background: #46b06a; } .TB { background: #888; }
  .EZ { background: #46b0a0; } .FL { background: #555; }
  table.builder { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.builder th, table.builder td { border: 1px solid #34343c; padding: 5px; }
  table.builder th { background: #2a2a30; }
  table.builder input { width: 100%; min-width: 50px; }
  table.builder .auto { color: #8a8; }
  .card { background: #232329; border: 1px solid #34343c; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .muted { color: #a0a0a8; font-size: 12px; }
  .empty { color: #a0a0a8; padding: 30px; text-align: center; }
  .save-state { font-size: 12px; color: #46b06a; }
  @media (max-width: 640px) { .slot { flex-wrap: wrap; } .slot .cover { width: 100%; height: auto; } }
</style>
</head>
<body>
<header>
  <h1 id="tname">Mappool</h1>
  <div class="tabs" id="tabs"></div>
  <div class="user" id="userbox"></div>
</header>
<main id="app"><div class="empty">Loading…</div></main>

<script>
const MODS = ["NM","HD","HR","DT","FM","TB","EZ","FL"];
let me = null, pool = { name: "Mappool", rounds: [] }, view = "viewer", activeRound = null, saveTimer = null;
let sgStats = null; // last fetched stats for the suggest form

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Math.random().toString(36).slice(2, 9);

function parseOsu(url) {
  let setId = null, mapId = null, m;
  if ((m = url.match(/beatmapsets\/(\d+)(?:#\w+\/(\d+))?/))) { setId = m[1]; mapId = m[2] || null; }
  else if ((m = url.match(/\/b\/(\d+)|beatmaps\/(\d+)/))) { mapId = m[1] || m[2]; }
  return { beatmapsetId: setId, beatmapId: mapId };
}
const cover = id => id ? `https://assets.ppy.sh/beatmaps/${id}/covers/cover.jpg` : "";
function mapLink(s) {
  if (s.beatmapsetId && s.beatmapId) return `https://osu.ppy.sh/beatmapsets/${s.beatmapsetId}#osu/${s.beatmapId}`;
  if (s.beatmapId) return `https://osu.ppy.sh/beatmaps/${s.beatmapId}`;
  if (s.beatmapsetId) return `https://osu.ppy.sh/beatmapsets/${s.beatmapsetId}`;
  return "#";
}
async function api(path, opts) {
  const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || res.status); }
  return res.json();
}
async function fetchStats(beatmapId, mod) {
  return api(`/api/beatmap?id=${encodeURIComponent(beatmapId)}&mod=${encodeURIComponent(mod||"NM")}`);
}
function statLine(s) {
  const out = [];
  if (s.stars != null && s.stars !== "")  out.push(`<b>${esc(s.stars)}★</b>`);
  if (s.bpm)    out.push(`${esc(s.bpm)} BPM`);
  if (s.length) out.push(esc(s.length));
  if (s.cs != null && s.cs !== "") out.push(`CS ${esc(s.cs)}`);
  if (s.ar != null && s.ar !== "") out.push(`AR ${esc(s.ar)}`);
  if (s.od != null && s.od !== "") out.push(`OD ${esc(s.od)}`);
  if (s.hp != null && s.hp !== "") out.push(`HP ${esc(s.hp)}`);
  return out;
}

async function init() {
  try { me = (await api("/api/me")).user; } catch (e) { me = null; }
  try { pool = (await api("/api/pool")).pool; } catch (e) {}
  if (!activeRound) activeRound = pool.rounds[0]?.id || null;
  render();
}
const isHost = () => me && me.role === "host";
const canSuggest = () => me && (me.role === "host" || me.role === "mappooler");

function render() {
  document.getElementById("tname").textContent = pool.name || "Mappool";
  const ub = document.getElementById("userbox");
  ub.innerHTML = me
    ? `<img src="${esc(me.avatar_url||"")}" alt=""><span>${esc(me.username)}</span><span class="pill">${esc(me.role)}</span><a class="btn secondary" href="/api/auth/logout">Logout</a>`
    : `<a class="btn" href="/api/auth/login">Login with osu!</a>`;
  const tabs = [["viewer","Viewer"]];
  if (canSuggest()) tabs.push(["suggest","Suggestions"]);
  if (isHost()) { tabs.push(["builder","Builder"]); tabs.push(["admin","Admin"]); }
  if (!tabs.find(t => t[0] === view)) view = "viewer";
  document.getElementById("tabs").innerHTML = tabs.map(([k,l]) => `<button class="${k===view?'active':''}" onclick="view='${k}';render()">${l}</button>`).join("");
  ({ viewer: renderViewer, builder: renderBuilder, suggest: renderSuggest, admin: renderAdmin }[view])();
}

function roundBar(active, varName) {
  return `<div class="round-bar">` + pool.rounds.map(r =>
    `<button class="${r.id===active.id?'active':''}" onclick="${varName}='${r.id}';render()">${esc(r.name)}</button>`).join("") + `</div>`;
}

/* ---------- VIEWER ---------- */
function renderViewer() {
  const app = document.getElementById("app");
  if (!pool.rounds.length) { app.innerHTML = `<div class="empty">No rounds yet.</div>`; return; }
  const round = pool.rounds.find(r => r.id === activeRound) || pool.rounds[0];
  activeRound = round.id;
  let html = roundBar(round, "activeRound");
  if (round.mappackUrl) html += `<p><a class="btn" href="${esc(round.mappackUrl)}" target="_blank" rel="noopener">⬇ Download Mappack</a></p>`;
  const slots = round.slots || [];
  if (!slots.length) { app.innerHTML = html + `<div class="empty">No maps in ${esc(round.name)} yet.</div>`; return; }
  const order = m => { const i = MODS.indexOf(m); return i === -1 ? 99 : i; };
  const groups = {};
  slots.forEach(s => (groups[s.mod] = groups[s.mod] || []).push(s));
  Object.keys(groups).sort((a,b)=>order(a)-order(b)).forEach(mod => {
    html += `<div class="mod-group"><div class="mod-header">${esc(mod)}</div>`;
    groups[mod].forEach(s => {
      const stats = statLine(s);
      const skills = (s.skills||"").split(",").map(x=>x.trim()).filter(Boolean);
      html += `<div class="slot">
        <span class="badge ${esc(s.mod)}">${esc(s.mod)}${esc(s.index||"")}</span>
        <img class="cover" src="${cover(s.beatmapsetId)}" onerror="this.style.visibility='hidden'" alt="">
        <div class="info">
          <div class="title"><a href="${mapLink(s)}" target="_blank" rel="noopener">${esc(s.artist?s.artist+" - ":"")}${esc(s.title||"Untitled")}</a></div>
          <div class="sub">[${esc(s.difficulty||"?")}] mapped by ${esc(s.mapper||"?")}</div>
          ${stats.length?`<div class="stats">${stats.join(" ")}</div>`:""}
          ${skills.length?`<div class="skills">${skills.map(t=>`<span class="skill-tag">${esc(t)}</span>`).join("")}</div>`:""}
        </div></div>`;
    });
    html += `</div>`;
  });
  app.innerHTML = html;
}

/* ---------- BUILDER ---------- */
function savePool(now) {
  clearTimeout(saveTimer);
  const doSave = async () => {
    const el = document.getElementById("savestate");
    if (el) el.textContent = "Saving…";
    try { await api("/api/pool", { method: "POST", body: JSON.stringify(pool) }); if (el) el.textContent = "Saved ✓"; }
    catch (e) { if (el) el.textContent = "Save failed: " + e.message; }
  };
  now ? doSave() : (saveTimer = setTimeout(doSave, 600));
}
function renderBuilder() {
  const app = document.getElementById("app");
  let html = `<div class="row">
      <div class="field"><label>Tournament name</label>
        <input value="${esc(pool.name)}" oninput="pool.name=this.value;document.getElementById('tname').textContent=this.value;savePool()"></div>
      <div class="field"><label>New round</label><input id="newRound" placeholder="e.g. Quarterfinals"></div>
      <button class="btn" onclick="addRound()">+ Add round</button>
      <span id="savestate" class="save-state"></span>
    </div>`;
  if (!pool.rounds.length) { app.innerHTML = html + `<div class="empty">No rounds yet.</div>`; return; }
  const round = pool.rounds.find(r => r.id === activeRound) || pool.rounds[0];
  activeRound = round.id;
  html += roundBar(round, "activeRound");
  html += `<div class="row">
      <div class="field" style="flex:1;min-width:240px"><label>Mappack URL</label>
        <input value="${esc(round.mappackUrl||"")}" oninput="setRound('${round.id}','mappackUrl',this.value)" placeholder="https://..."></div>
      <button class="btn danger" onclick="deleteRound('${round.id}')">Delete round</button>
    </div>`;
  html += `<div style="overflow-x:auto"><table class="builder"><thead><tr>
    <th>Mod</th><th>#</th><th>osu! link</th><th>Title (auto)</th>
    <th>★</th><th>BPM</th><th>Len</th><th>CS</th><th>AR</th><th>OD</th><th>HP</th><th>Skills</th><th></th></tr></thead><tbody>`;
  (round.slots||[]).forEach(s => {
    html += `<tr>
      <td><select onchange="onModChange('${s._id}',this.value)">${MODS.map(m=>`<option ${m===s.mod?'selected':''}>${m}</option>`).join("")}</select></td>
      <td><input value="${esc(s.index||"")}" style="width:36px" oninput="upd('${s._id}','index',this.value)"></td>
      <td><input value="${esc(s._link||"")}" placeholder="paste link" onchange="onLink('${s._id}',this.value)"></td>
      <td><input class="auto" value="${esc(s.artist?s.artist+' - ':'')}${esc(s.title||'')}" title="auto-filled" readonly></td>
      <td><input value="${esc(s.stars ?? '')}" style="width:48px" oninput="upd('${s._id}','stars',this.value)"></td>
      <td><input value="${esc(s.bpm ?? '')}" style="width:52px" oninput="upd('${s._id}','bpm',this.value)"></td>
      <td><input value="${esc(s.length ?? '')}" style="width:50px" oninput="upd('${s._id}','length',this.value)"></td>
      <td><input value="${esc(s.cs ?? '')}" style="width:42px" oninput="upd('${s._id}','cs',this.value)"></td>
      <td><input value="${esc(s.ar ?? '')}" style="width:42px" oninput="upd('${s._id}','ar',this.value)"></td>
      <td><input value="${esc(s.od ?? '')}" style="width:42px" oninput="upd('${s._id}','od',this.value)"></td>
      <td><input value="${esc(s.hp ?? '')}" style="width:42px" oninput="upd('${s._id}','hp',this.value)"></td>
      <td><input value="${esc(s.skills||"")}" placeholder="stream, aim" oninput="upd('${s._id}','skills',this.value)"></td>
      <td style="white-space:nowrap">
        <button class="btn secondary" title="Re-fetch stats" onclick="fetchSlot('${s._id}')">↻</button>
        <button class="btn danger" onclick="delSlot('${s._id}')">✕</button></td></tr>`;
  });
  html += `</tbody></table></div>
    <div class="row" style="margin-top:10px"><button class="btn" onclick="addSlot('${round.id}')">+ Add map</button>
    <span class="muted">Paste a difficulty link (with #osu/&lt;id&gt;) — stats auto-fill and recalc when you change the mod. ↻ re-fetches. Fields stay editable for manual overrides.</span></div>`;
  app.innerHTML = html;
}
function addRound() {
  const name = (document.getElementById("newRound").value||"").trim(); if (!name) return;
  const r = { id: uid(), name, mappackUrl: "", slots: [] };
  pool.rounds.push(r); activeRound = r.id; savePool(true); render();
}
function deleteRound(id) {
  if (!confirm("Delete this round and its maps?")) return;
  pool.rounds = pool.rounds.filter(r => r.id !== id);
  activeRound = pool.rounds[0]?.id || null; savePool(true); render();
}
function setRound(id, field, v) { const r = pool.rounds.find(x=>x.id===id); if (r){ r[field]=v; savePool(); } }
function addSlot(roundId) {
  const r = pool.rounds.find(x=>x.id===roundId); if (!r) return;
  r.slots.push({ _id: uid(), mod:"NM", index:"", title:"", artist:"", difficulty:"", mapper:"", stars:"", bpm:"", length:"", cs:"", ar:"", od:"", hp:"", skills:"", beatmapId:null, beatmapsetId:null, _link:"" });
  savePool(); renderBuilder();
}
function delSlot(sid) {
  const r = pool.rounds.find(x=>x.id===activeRound); if (!r) return;
  r.slots = r.slots.filter(s=>s._id!==sid); savePool(); renderBuilder();
}
function findSlot(sid) { for (const r of pool.rounds){ const s=(r.slots||[]).find(x=>x._id===sid); if (s) return s; } return null; }
function upd(sid, field, v) { const s = findSlot(sid); if (s){ s[field]=v; savePool(); } }
function onLink(sid, v) {
  const s = findSlot(sid); if (!s) return; s._link = v;
  const ids = parseOsu(v);
  if (ids.beatmapId) s.beatmapId = ids.beatmapId;
  if (ids.beatmapsetId) s.beatmapsetId = ids.beatmapsetId;
  savePool();
  if (s.beatmapId) fetchSlot(sid);   // auto-fill on paste
}
function onModChange(sid, v) {
  const s = findSlot(sid); if (!s) return; s.mod = v; savePool();
  if (s.beatmapId) fetchSlot(sid);   // recalc stats for the new mod
  else renderBuilder();
}
async function fetchSlot(sid) {
  const s = findSlot(sid); if (!s) return;
  if (!s.beatmapId) { alert("Paste a difficulty link first (it must contain #osu/<id>)."); return; }
  const el = document.getElementById("savestate"); if (el) el.textContent = "Fetching…";
  try {
    const d = await fetchStats(s.beatmapId, s.mod);
    Object.assign(s, {
      beatmapsetId: d.beatmapsetId, title: d.title, artist: d.artist, mapper: d.mapper,
      difficulty: d.difficulty, cs: d.cs, ar: d.ar, od: d.od, hp: d.hp, bpm: d.bpm, length: d.length, stars: d.stars,
    });
    savePool(true); renderBuilder();
  } catch (e) { if (el) el.textContent = "Fetch failed: " + e.message; }
}

/* ---------- SUGGESTIONS ---------- */
async function renderSuggest() {
  const app = document.getElementById("app");
  app.innerHTML = `<div class="empty">Loading suggestions…</div>`;
  let list = [];
  try { list = (await api("/api/suggestions")).suggestions; } catch (e) { app.innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
  const roundOpts = pool.rounds.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join("");
  let html = `<div class="card"><h3 style="margin-top:0">Suggest a map</h3>
    <div class="row">
      <div class="field"><label>Round</label><select id="sg-round"><option value="">—</option>${roundOpts}</select></div>
      <div class="field"><label>Mod</label><select id="sg-mod" onchange="sgFetch()">${MODS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="field" style="flex:1;min-width:220px"><label>osu! difficulty link</label><input id="sg-link" placeholder="https://osu.ppy.sh/beatmapsets/..#osu/.." onchange="sgFetch()"></div>
    </div>
    <div id="sg-preview" class="muted"></div>
    <div class="row" style="margin-top:8px">
      <div class="field" style="flex:2;min-width:220px"><label>Comment</label><input id="sg-comment" placeholder="why this map?"></div>
      <button class="btn" onclick="submitSuggestion()">Submit</button>
    </div></div>`;
  html += `<h3>Suggestions (${list.length})</h3>`;
  if (!list.length) html += `<div class="empty">No suggestions yet.</div>`;
  list.forEach(s => {
    const stats = statLine(s);
    const payload = encodeURIComponent(JSON.stringify(s));
    html += `<div class="card"><div style="display:flex;gap:12px;align-items:center">
      ${s.beatmapsetId?`<img class="cover" src="${cover(s.beatmapsetId)}" onerror="this.style.display='none'" alt="">`:""}
      <div style="flex:1;min-width:0">
        <div><span class="badge ${esc(s.mod)}" style="display:inline-block;width:auto;padding:2px 8px">${esc(s.mod)}</span>
          ${s.round?`<span class="pill">${esc(s.round)}</span>`:""}
          ${s.link?`<a href="${esc(s.link)}" target="_blank" rel="noopener">${esc((s.artist?s.artist+' - ':'')+(s.title||s.link))}</a>`:esc(s.title)}
          ${s.difficulty?`<span class="muted"> [${esc(s.difficulty)}]</span>`:""}</div>
        ${stats.length?`<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#c8c8d0;margin-top:4px">${stats.join(" ")}</div>`:""}
        ${s.comment?`<div class="muted">${esc(s.comment)}</div>`:""}
        <div class="muted">by ${esc(s.by)} · ${new Date(s.at).toLocaleString()}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${isHost()?`<button class="btn" onclick="addSuggestionToPool('${payload}')">→ Add to pool</button>`:""}
        ${(isHost()||s.byId===me.id)?`<button class="btn danger" onclick="delSuggestion('${s.id}')">Delete</button>`:""}
      </div></div></div>`;
  });
  app.innerHTML = html;
}
async function sgFetch() {
  sgStats = null;
  const link = document.getElementById("sg-link").value.trim();
  const mod = document.getElementById("sg-mod").value;
  const prev = document.getElementById("sg-preview");
  const ids = parseOsu(link);
  if (!ids.beatmapId) { prev.textContent = link ? "Tip: use a difficulty link containing #osu/<id> to auto-fill stats." : ""; return; }
  prev.textContent = "Fetching stats…";
  try {
    const d = await fetchStats(ids.beatmapId, mod);
    sgStats = d;
    prev.innerHTML = `<b>${esc(d.artist)} - ${esc(d.title)}</b> [${esc(d.difficulty)}] · ` + statLine(d).join(" ");
  } catch (e) { prev.textContent = "Could not fetch: " + e.message; }
}
async function submitSuggestion() {
  const link = document.getElementById("sg-link").value.trim();
  const body = {
    round: document.getElementById("sg-round").value,
    mod: document.getElementById("sg-mod").value,
    link,
    comment: document.getElementById("sg-comment").value.trim(),
  };
  if (sgStats) Object.assign(body, {
    title: sgStats.title, artist: sgStats.artist, mapper: sgStats.mapper, difficulty: sgStats.difficulty,
    beatmapId: sgStats.beatmapId, beatmapsetId: sgStats.beatmapsetId,
    stars: sgStats.stars, bpm: sgStats.bpm, length: sgStats.length, cs: sgStats.cs, ar: sgStats.ar, od: sgStats.od, hp: sgStats.hp,
  });
  if (!body.link && !body.title) { alert("Add a link (or at least a title)."); return; }
  try { await api("/api/suggestions", { method: "POST", body: JSON.stringify(body) }); sgStats = null; renderSuggest(); }
  catch (e) { alert(e.message); }
}
async function delSuggestion(id) {
  if (!confirm("Delete this suggestion?")) return;
  try { await api("/api/suggestions?id=" + id, { method: "DELETE" }); renderSuggest(); }
  catch (e) { alert(e.message); }
}
function addSuggestionToPool(payload) {
  const s = JSON.parse(decodeURIComponent(payload));
  let r = pool.rounds.find(x => x.name === s.round) || pool.rounds[0];
  if (!r) { alert("Create a round first (Builder tab)."); return; }
  r.slots.push({ _id: uid(), mod: s.mod||"NM", index: "", title: s.title||"", artist: s.artist||"", difficulty: s.difficulty||"",
    mapper: s.mapper||"", stars: s.stars ?? "", bpm: s.bpm ?? "", length: s.length||"", cs: s.cs ?? "", ar: s.ar ?? "", od: s.od ?? "", hp: s.hp ?? "",
    skills: "", beatmapId: s.beatmapId||null, beatmapsetId: s.beatmapsetId||null, _link: s.link||"" });
  savePool(true);
  alert(`Added to ${r.name}.`);
}

/* ---------- ADMIN ---------- */
async function renderAdmin() {
  const app = document.getElementById("app");
  app.innerHTML = `<div class="empty">Loading roles…</div>`;
  let roles = [];
  try { roles = (await api("/api/roles")).roles; } catch (e) { app.innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
  let html = `<div class="card"><h3 style="margin-top:0">Assign role</h3>
    <div class="row">
      <div class="field" style="flex:1;min-width:200px"><label>osu! username or user ID</label><input id="rl-key" placeholder="e.g. peppy or 2"></div>
      <div class="field"><label>Role</label><select id="rl-role"><option value="mappooler">mappooler</option><option value="host">host</option></select></div>
      <button class="btn" onclick="assignRole()">Save</button>
    </div>
    <span class="muted"><b>host</b> = full admin (builder + everything). <b>mappooler</b> = suggest & view suggestions. Everyone else views only.</span>
  </div>`;
  html += `<h3>Current roles (${roles.length})</h3>`;
  if (!roles.length) html += `<div class="empty">No roles assigned yet. The OWNER_OSU_ID account is always host.</div>`;
  roles.forEach(r => {
    html += `<div class="card" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1"><b>${esc(r.username||r.id)}</b> <span class="muted">(id ${esc(r.id)})</span> — <span class="pill">${esc(r.role)}</span></div>
      <button class="btn danger" onclick="removeRole('${esc(r.id)}','${esc(r.username||r.id)}')">Remove</button></div>`;
  });
  app.innerHTML = html;
}
async function assignRole() {
  const key = document.getElementById("rl-key").value.trim();
  const role = document.getElementById("rl-role").value;
  if (!key) return;
  try { await api("/api/roles", { method: "POST", body: JSON.stringify({ key, role }) }); renderAdmin(); }
  catch (e) { alert(e.message); }
}
async function removeRole(id, name) {
  if (!confirm(`Remove role from ${name}?`)) return;
  try { await api("/api/roles", { method: "POST", body: JSON.stringify({ key: id, role: "user" }) }); renderAdmin(); }
  catch (e) { alert(e.message); }
}

init();
</script>
